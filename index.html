<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Message 👀</title>

<style>
body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
color:white;
text-align:center;
}

.card{
background:rgba(255,255,255,0.15);
padding:40px;
border-radius:20px;
backdrop-filter:blur(10px);
max-width:400px;
}

button{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

#msg{
display:none;
margin-top:20px;
font-size:18px;
}
</style>
</head>

<body>

<div class="card">
<h2>📸 Secret Message</h2>
<p>Click below to reveal something important</p>

<button onclick="showMsg()">Reveal Message</button>

<div id="msg">
Hey! I know you’re busy with your life lately 😄  
But whenever you get a little time, please send the pictures you clicked of us the other day.  
I’ve been waiting to see them! 📷✨
</div>
</div>

<script>
function showMsg(){
document.getElementById("msg").style.display="block";
}
</script>

</body>
</html>
